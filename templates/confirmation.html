<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Confirmed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 border border-gray-700 rounded-2xl shadow-2xl max-w-md w-full p-8 text-center relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-green-500"></div>

        <div class="bg-green-500/10 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 animate-pulse">
            <div class="bg-green-500 w-16 h-16 rounded-full flex items-center justify-center shadow-lg shadow-green-500/50">
                <i class="fa-solid fa-check text-3xl text-white"></i>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-white mb-4 tracking-tight">Ride Confirmed!</h1>
        
        <p class="text-gray-400 mb-8 text-lg leading-relaxed">
             Thank you for booking with us!
        </p>

        <a href="/" class="inline-flex items-center justify-center px-6 py-3 text-base font-medium text-gray-300 transition-all duration-200 bg-gray-700 border border-gray-600 rounded-lg hover:bg-gray-600 hover:text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 focus:ring-gray-600">
            <i class="fa-solid fa-arrow-left mr-2"></i>
            Return Home
        </a>
    </div>

</body>
</html>
