<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Booking Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 border border-gray-700 rounded-2xl shadow-2xl max-w-md w-full p-8 text-center transform transition-all hover:scale-105 duration-300">
        
        <div class="bg-blue-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/50">
            <i class="fa-solid fa-car-side text-3xl text-white"></i>
        </div>

        <h1 class="text-3xl font-bold text-white mb-4 tracking-tight">Book Your Ride</h1>
        
        <p class="text-gray-400 mb-8 text-lg leading-relaxed">
            Fast, reliable, and convenient.
        </p>

        <a href="/book" class="inline-flex items-center justify-center px-8 py-4 text-lg font-semibold text-white transition-all duration-200 bg-blue-600 border border-transparent rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 focus:ring-blue-600 w-full group">
            Book a Ride Now
            <i class="fa-solid fa-arrow-right ml-3 group-hover:translate-x-1 transition-transform"></i>
        </a>

        <div class="mt-6 pt-6 border-t border-gray-700">
            <p class="text-xs text-gray-500 flex items-center justify-center">
                <i class="fa-solid fa-shield-halved text-yellow-400 mr-2"></i> Secure and fast booking process
            </p>
        </div>
    </div>

</body>
</html>
